<!DOCTYPE html>
<html>
    <head>
        <title></title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.1/dist/markdown-it.min.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown.min.css" integrity="sha512-BrOPA520KmDMqieeM7XFe6a3u3Sb3F1JBaQnrIAmWg3EYrciJ+Qqe6ZcKCdfPv26rGcgTrJnZ/IdQEct8h3Zhw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap');
            * {
                outline: none;
                user-select: none;
                font-family: "Google Sans Flex", sans-serif;
                font-optical-sizing: auto;
            }
            .markdown-body {
                box-sizing: border-box;
                min-width: 200px;
                max-width: 980px;
                margin: 0 auto;
                padding: 45px;
            }

            @media (max-width: 767px) {
                .markdown-body {
                    padding: 15px;
                }
            }

            @media (prefers-color-scheme: dark) {
                body {
                    background-color: #0d1117;
                }
            }
        </style>
    </head>
    <body>
    </body>
    <script>
        window.addEventListener("load", async () => {
            console.log(window.location.hash)
            if (window.location.hash.length > 0) {
                text = await (await fetch(atob(window.location.hash.split("#")[1]))).text()
                md = window.markdownit()
                document.body.innerHTML = `<article class="markdown-body">${md.render(text)}</article>`
            }
        })
    </script>
</html>
